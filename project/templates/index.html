<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polling System - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 36px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }
        
        .search-container {
            position: relative;
            margin-bottom: 30px;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 18px 20px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .autocomplete-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #ddd;
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        
        .autocomplete-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        
        .autocomplete-item:hover {
            background: #f8f9fa;
        }
        
        .autocomplete-item:last-child {
            border-bottom: none;
        }
        
        .item-type {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
            background: #fff3e0;
            color: #f57c00;
        }
        
        .item-detail {
            font-size: 13px;
            color: #999;
            margin-top: 3px;
        }
        
        button {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .flash {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .flash.error {
            background-color: #f8d7da;
            color: #721c24;
        }
        
        .flash.success {
            background-color: #d4edda;
            color: #155724;
        }
        
        .help-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
            line-height: 1.6;
        }
        
        .help-text strong {
            color: #333;
        }
        
        .example {
            display: inline-block;
            padding: 4px 10px;
            background: #f0f4ff;
            border-radius: 5px;
            margin: 3px;
            font-family: 'Courier New', monospace;
            color: #667eea;
            font-weight: bold;
        }
        
        .admin-link {
            text-align: center;
            margin-top: 30px;
        }
        
        .admin-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        .admin-link a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            input[type="text"],
            button {
                font-size: 16px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Polling System</h1>
        <p class="subtitle">Find polls by school district</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="search-container">
                <input 
                    type="text" 
                    name="query" 
                    id="searchInput"
                    placeholder="Enter school district name..."
                    autocomplete="off"
                    required
                >
                <div class="autocomplete-results" id="autocompleteResults"></div>
            </div>
            
            <button type="submit">Find Polls</button>
        </form>
        

        <div class="admin-link">
            <a href="{{ url_for('admin_login') }}">Admin Login</a>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const autocompleteResults = document.getElementById('autocompleteResults');
        let debounceTimer;
        
        searchInput.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            const query = this.value.trim();
            
            if (query.length < 2) {
                autocompleteResults.style.display = 'none';
                return;
            }
            
            debounceTimer = setTimeout(() => {
                fetchAutocomplete(query);
            }, 300);
        });
        
        async function fetchAutocomplete(query) {
            try {
                const response = await fetch(`/api/search-schools?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                console.log('School search response:', data);
                
                let results = [];
                
                if (data.schools && data.schools.length > 0) {
                    data.schools.forEach(school => {
                        const zipcodeCount = school.zipcode_count || 0;
                        const detail = `${school.city}, ${school.county} County (${zipcodeCount} zip code${zipcodeCount !== 1 ? 's' : ''})`;
                        
                        results.push({
                            display: school.district,
                            value: school.district,
                            detail: detail
                        });
                    });
                }
                
                console.log('Autocomplete results:', results);
                
                displayResults(results);
            } catch (error) {
                console.error('Autocomplete error:', error);
            }
        }
        
        function displayResults(results) {
            if (results.length === 0) {
                autocompleteResults.style.display = 'none';
                return;
            }
            
            autocompleteResults.innerHTML = '';
            
            results.forEach(result => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                
                item.innerHTML = `
                    <span class="item-type">DISTRICT</span>
                    <strong>${result.display}</strong>
                    ${result.detail ? `<div class="item-detail">${result.detail}</div>` : ''}
                `;
                
                item.addEventListener('click', () => {
                    searchInput.value = result.value;
                    autocompleteResults.style.display = 'none';
                });
                
                autocompleteResults.appendChild(item);
            });
            
            autocompleteResults.style.display = 'block';
        }
        
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !autocompleteResults.contains(e.target)) {
                autocompleteResults.style.display = 'none';
            }
        });
    </script>
</body>
</html>
