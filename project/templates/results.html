<!DOCTYPE html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ poll.title }} - Poll Results</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .total-votes {
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .total-votes h2 {
            font-size: 36px;
            margin: 0;
        }
        
        .result-item {
            margin-bottom: 25px;
        }
        
        .result-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }
        
        .result-bar-container {
            height: 40px;
            background: #e9ecef;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        
        .result-bar {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #20c997);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: width 1s ease;
            font-size: 16px;
        }
        
        .buttons {
            text-align: center;
            margin-top: 40px;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            margin: 0 10px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .no-votes {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ poll.title }}</h1>
        <p class="subtitle">Poll Results</p>
        
        <div class="total-votes">
            <h2>Total Votes: {{ total_votes }}</h2>
        </div>
        
        {% if total_votes > 0 %}
            {% for option, data in results.items() %}
            <div class="result-item">
                <div class="result-label">
                    <span>{{ option }}</span>
                    <span>{{ data.count }} votes ({{ data.percentage }}%)</span>
                </div>
                <div class="result-bar-container">
                    <div class="result-bar" style="width: {{ data.percentage }}%">
                        {{ data.percentage }}%
                    </div>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <p class="no-votes">
                No votes
            </p>
        {% endif %}
        
        <div class="buttons">
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Back to Homepage</a>
        </div>
    </div>
</body>
</html>
